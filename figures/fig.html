<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"
                markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#95a5a6" stroke="none"/>
        </marker>
        <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"
                markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c" stroke="none"/>
        </marker>
        <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"
                markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#5c6bc0" stroke="none"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" fill="#f8f9fa"/>

    <!-- Title -->
    <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
          fill="#2c3e50">
        Hybrid ECFP-BERT: Mixed Embedding Strategy for Reaction Conditions
    </text>

    <!-- Input Text Example -->
    <g id="input-section">
        <rect x="50" y="80" width="1100" height="80" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="5"/>
        <text x="600" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
              fill="#2c3e50">
            Input: Reaction Conditions
        </text>
        <text x="600" y="140" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">
            "Cat: !SMILES:CCN(CC)CC! Cat: !SMILES:Pd(PPh3)4! wave_length: 300 Lig: !!SMILES:C1CCOC1! Temp: 39"
        </text>
    </g>

    <!-- Tokenization Step -->
    <g id="tokenization">
        <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7f8c8d">
            Step 1: Tokenization
        </text>

        <!-- Token boxes -->
        <g id="tokens">
            <!-- Regular text tokens -->
            <rect x="100" y="220" width="50" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="125" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">Cat:</text>

            <!-- SMILES token 1 -->
            <rect x="160" y="220" width="160" height="40" fill="#ffe5e5" stroke="#e74c3c" stroke-width="2" rx="3"/>
            <text x="200" y="240" font-family="monospace" font-size="12" text-anchor="middle" fill="#c0392b">
                !SMILES:CCN(CC)CC!
            </text>
            <text x="200" y="252" font-family="Arial" font-size="9" text-anchor="middle" fill="#e74c3c"></text>

            <!-- Regular tokens -->
            <rect x="250" y="220" width="40" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="270" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">
                Cat:
            </text>

            <!-- SMILES token 2 -->
            <rect x="300" y="220" width="100" height="40" fill="#ffe5e5" stroke="#e74c3c" stroke-width="2" rx="3"/>
            <text x="350" y="240" font-family="monospace" font-size="11" text-anchor="middle" fill="#c0392b">
                !SMILES:Pd(PPh3)4!
            </text>
            <text x="350" y="252" font-family="Arial" font-size="9" text-anchor="middle" fill="#e74c3c">
            </text>

            <!-- Regular tokens -->
            <rect x="410" y="220" width="70" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="445" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">
                wave_length:
            </text>

            <rect x="490" y="220" width="30" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="505" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">in</text>

            <!-- SMILES token 3 -->
            <rect x="530" y="220" width="60" height="40" fill="#ffe5e5" stroke="#e74c3c" stroke-width="2" rx="3"/>
            <text x="560" y="240" font-family="monospace" font-size="11" text-anchor="middle" fill="#c0392b">C1CCOC1
            </text>
            <text x="560" y="252" font-family="Arial" font-size="9" text-anchor="middle" fill="#e74c3c">(THF)</text>

            <!-- More regular tokens -->
            <rect x="600" y="220" width="30" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="615" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">at</text>

            <rect x="640" y="220" width="50" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="665" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">room</text>

            <rect x="700" y="220" width="90" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
            <text x="745" y="245" font-family="monospace" font-size="12" text-anchor="middle" fill="#2c3e50">
                temperature
            </text>
        </g>
    </g>

    <!-- Routing arrows -->
    <g id="routing">
        <text x="100" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7f8c8d">
            Step 2: Dynamic Routing
        </text>

        <!-- Straight arrows for text tokens -->
        <path d="M 125 260 L 125 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 270 260 L 270 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 445 260 L 445 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 505 260 L 505 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 615 260 L 615 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 665 260 L 665 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>
        <path d="M 745 260 L 745 340" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowgray)" fill="none"/>

        <!-- Curved arrows for SMILES tokens to ECFP processing -->
        <path d="M 200 260 Q 200 290 950 290 Q 950 315 950 340" stroke="#e74c3c" stroke-width="2"
              marker-end="url(#arrowred)" fill="none"/>
        <path d="M 350 260 Q 350 280 950 280 Q 950 310 950 340" stroke="#e74c3c" stroke-width="2"
              marker-end="url(#arrowred)" fill="none"/>
        <path d="M 560 260 Q 560 285 950 285 Q 950 312 950 340" stroke="#e74c3c" stroke-width="2"
              marker-end="url(#arrowred)" fill="none"/>
    </g>

    <!-- Embedding Methods -->
    <g id="embedding-methods">
        <!-- Learned Embeddings -->
        <g id="learned-embed">
            <rect x="50" y="350" width="400" height="180" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" rx="5"/>
            <text x="250" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
                  fill="#27ae60">
                Learned Embeddings (Standard BERT)
            </text>

            <!-- Embedding matrix visualization -->
            <rect x="80" y="400" width="340" height="60" fill="#fff" stroke="#27ae60" stroke-width="1" rx="3"/>
            <text x="250" y="425" font-family="Arial" font-size="12" text-anchor="middle" fill="#2c3e50">
                Embedding Matrix (Vocab × d_model)
            </text>
            <text x="250" y="445" font-family="monospace" font-size="10" text-anchor="middle" fill="#7f8c8d">
                Trainable parameters
            </text>

            <!-- Example embeddings -->
            <g id="embed-examples">
                <circle cx="120" cy="490" r="4" fill="#27ae60"/>
                <text x="130" y="495" font-family="Arial" font-size="11" fill="#2c3e50">"Add" → [0.23, -0.51, 0.87,
                    ...]
                </text>
                <circle cx="120" cy="510" r="4" fill="#27ae60"/>
                <text x="130" y="515" font-family="Arial" font-size="11" fill="#2c3e50">"catalyst" → [0.41, 0.22, -0.13,
                    ...]
                </text>
            </g>
        </g>

        <!-- ECFP Processing -->
        <g id="ecfp-embed">
            <rect x="750" y="350" width="400" height="180" fill="#fff3e0" stroke="#f39c12" stroke-width="2" rx="5"/>
            <text x="950" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
                  fill="#f39c12">
                ECFP Fingerprint Processing
            </text>

            <!-- ECFP generation -->
            <rect x="780" y="400" width="150" height="40" fill="#fff" stroke="#f39c12" stroke-width="1" rx="3"/>
            <text x="855" y="415" font-family="Arial" font-size="11" text-anchor="middle" fill="#2c3e50">SMILES →
                Molecule
            </text>
            <text x="855" y="430" font-family="monospace" font-size="10" text-anchor="middle" fill="#7f8c8d">RDKit
            </text>

            <!-- ECFP calculation -->
            <rect x="950" y="400" width="170" height="40" fill="#fff" stroke="#f39c12" stroke-width="1" rx="3"/>
            <text x="1035" y="415" font-family="Arial" font-size="11" text-anchor="middle" fill="#2c3e50">Generate
                ECFP
            </text>
            <text x="1035" y="430" font-family="monospace" font-size="10" text-anchor="middle" fill="#7f8c8d">radius=2,
                bits=1024
            </text>

            <!-- Binary fingerprint visualization -->
            <g id="fingerprint-vis">
                <text x="780" y="465" font-family="Arial" font-size="11" fill="#2c3e50">Fingerprint:</text>
                <text x="850" y="465" font-family="monospace" font-size="10" fill="#f39c12">[1,0,0,1,1,0,1,0,0,1...]
                </text>
            </g>

            <!-- Projection layer -->
            <rect x="780" y="480" width="340" height="35" fill="#ffe0b2" stroke="#f39c12" stroke-width="1" rx="3"/>
            <text x="950" y="500" font-family="Arial" font-size="11" text-anchor="middle" fill="#2c3e50">
                Linear Projection (1024 → d_model)
            </text>
        </g>
    </g>

    <!-- Combination arrows -->
    <g id="combination-arrows">
        <!-- Arrow from learned embeddings to unified sequence -->
        <path d="M 250 530 L 250 580" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowblue)" fill="none"/>
        <!-- Arrow from ECFP to unified sequence -->
        <path d="M 950 530 L 950 580" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowblue)" fill="none"/>
    </g>

    <!-- Combination -->
    <g id="combination">
        <text x="100" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7f8c8d">
            Step 3: Unified Sequence
        </text>

        <!-- Combined sequence -->
        <rect x="100" y="590" width="1000" height="60" fill="#f0f4ff" stroke="#5c6bc0" stroke-width="2" rx="5"/>

        <!-- Mixed embeddings visualization -->
        <g id="mixed-embeddings">
            <rect x="120" y="605" width="50" height="30" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="2"/>
            <text x="145" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#27ae60">Learned</text>

            <rect x="180" y="605" width="50" height="30" fill="#fff3e0" stroke="#f39c12" stroke-width="1" rx="2"/>
            <text x="205" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#f39c12">ECFP</text>

            <rect x="240" y="605" width="50" height="30" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="2"/>
            <text x="265" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#27ae60">Learned</text>

            <rect x="300" y="605" width="50" height="30" fill="#fff3e0" stroke="#f39c12" stroke-width="1" rx="2"/>
            <text x="325" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#f39c12">ECFP</text>

            <rect x="360" y="605" width="50" height="30" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="2"/>
            <text x="385" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#27ae60">Learned</text>

            <rect x="420" y="605" width="50" height="30" fill="#fff3e0" stroke="#f39c12" stroke-width="1" rx="2"/>
            <text x="445" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#f39c12">ECFP</text>

            <rect x="480" y="605" width="50" height="30" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="2"/>
            <text x="505" y="625" font-family="Arial" font-size="10" text-anchor="middle" fill="#27ae60">Learned</text>

            <text x="550" y="625" font-family="Arial" font-size="12" fill="#5c6bc0">...</text>

            <text x="650" y="625" font-family="Arial" font-size="11" fill="#2c3e50">
                All embeddings have same dimension (d_model)
            </text>
        </g>
    </g>

    <!-- BERT Processing -->
    <g id="bert-processing">
        <text x="100" y="690" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7f8c8d">
            Step 4: Standard BERT Processing
        </text>

        <rect x="350" y="710" width="500" height="60" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
        <text x="600" y="745" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
              fill="#1976d2">
            BERT Transformer Layers
        </text>

        <!-- Arrow from combination to BERT -->
        <path d="M 600 650 L 600 705" stroke="#5c6bc0" stroke-width="3" marker-end="url(#arrowblue)" fill="none"/>
    </g>

    <!-- Key advantages box
    <g id="advantages">
        <rect x="850" y="80" width="330" height="120" fill="#fef9e7" stroke="#f1c40f" stroke-width="1" rx="5"
              opacity="0.9"/>
        <text x="865" y="105" font-family="Arial" font-size="12" font-weight="bold" fill="#f39c12">Key Advantages:
        </text>
        <text x="865" y="125" font-family="Arial" font-size="11" fill="#2c3e50">• Chemical structures use pre-computed
        </text>
        <text x="875" y="143" font-family="Arial" font-size="11" fill="#2c3e50">fingerprints (no training needed)</text>
        <text x="865" y="161" font-family="Arial" font-size="11" fill="#2c3e50">• Regular text uses learned embeddings
        </text>
        <text x="865" y="179" font-family="Arial" font-size="11" fill="#2c3e50">• Single unified model architecture
        </text>
    </g>-->
</svg>
